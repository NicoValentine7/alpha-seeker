name: 日次スコアリング

on:
  schedule:
    # 米国市場クローズ後 UTC 22:00 = EST 17:00 = JST 07:00（翌朝）
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scoring:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: uv インストール
        uses: astral-sh/setup-uv@v4

      - name: 依存関係インストール
        run: uv sync

      - name: S&P500 スコアリング実行
        run: |
          PORTFOLIO=$(python -c "import json; print(' '.join(json.load(open('config/portfolio.json'))['tickers']))")
          uv run python -m stock_ranking.ranking --top 50 --extra $PORTFOLIO
        env:
          PYTHONUNBUFFERED: '1'
          FETCH_MAX_WORKERS: '4'

      - name: IC分析（5日前のCSVと照合）
        run: |
          # 5営業日前のCSVが存在すれば、そのスコアの予測力を検証
          CSV_5D_AGO=$(ls output/ranking_*.csv | sort | tail -6 | head -1 2>/dev/null || echo "")
          if [ -n "$CSV_5D_AGO" ] && [ -f "$CSV_5D_AGO" ]; then
            echo "IC分析対象: $CSV_5D_AGO"
            uv run python -m stock_ranking.backtest --csv "$CSV_5D_AGO" --days 5 --save || echo "IC分析スキップ（データ不足）"
          else
            echo "IC分析スキップ: 過去CSVなし"
          fi
        env:
          PYTHONUNBUFFERED: '1'
        continue-on-error: true

      - name: ranking.json を生成
        run: |
          uv run python -c "
          import pandas as pd, json, math, glob, ast, os

          csv_files = sorted(glob.glob('output/ranking_*.csv'))
          if not csv_files:
              print('CSVファイルなし')
              exit(1)

          csv_path = csv_files[-1]
          date_str = csv_path.split('ranking_')[1].replace('.csv', '')
          df = pd.read_csv(csv_path)

          # CSV保存時にstr()化されたリスト/辞書カラムをパース
          list_cols = ['news', 'analyst_actions', 'earnings_surprises', 'quarterly_results']
          for col in list_cols:
              if col in df.columns:
                  def parse_str_list(v):
                      if pd.isna(v) or v == '' or v == 'nan':
                          return None
                      if isinstance(v, str):
                          try:
                              return ast.literal_eval(v)
                          except (ValueError, SyntaxError):
                              return None
                      return v
                  df[col] = df[col].apply(parse_str_list)

          PORTFOLIO_TICKERS = json.load(open('config/portfolio.json'))['tickers']

          cols = ['ticker', 'name', 'sector', 'total_score', 'buy_signal', 'valuation_score', 'growth_score',
                  'quality_score', 'earnings_momentum_score', 'piotroski_fscore', 'piotroski_details',
                  'pe_ratio', 'forward_pe', 'pb_ratio', 'ev_ebitda', 'ps_ratio', 'fcf_yield',
                  'revenue_growth_calc', 'operating_income_growth', 'eps_growth', 'peg_ratio',
                  'roe', 'gross_margin', 'debt_to_equity', 'fcf_margin',
                  'avg_surprise_pct', 'eps_revision_90d', 'revenue_acceleration', 'forward_eps_growth',
                  'current_price', 'target_mean_price', 'upside_potential',
                  'recommendation_mean', 'num_analysts', 'is_value_trap', 'value_trap_reason',
                  'news', 'analyst_actions', 'next_earnings_date',
                  'earnings_surprises', 'quarterly_results',
                  'market_cap', 'earnings_beat_count', 'earnings_beat_total']
          available = [c for c in cols if c in df.columns]
          records = df[available].to_dict(orient='records')

          def clean(obj):
              if isinstance(obj, float) and (math.isnan(obj) or math.isinf(obj)):
                  return None
              if isinstance(obj, dict):
                  return {k: clean(v) for k, v in obj.items()}
              if isinstance(obj, list):
                  return [clean(v) for v in obj]
              return obj

          records = clean(records)

          # ポートフォリオフラグを付与
          record_tickers = {rec.get('ticker') for rec in records}
          missing_portfolio = [t for t in PORTFOLIO_TICKERS if t not in record_tickers]
          if missing_portfolio:
              print(f'WARNING: 保有銘柄がCSVに未収録: {missing_portfolio}')
              print(f'  → スコアリング時にデータ取得失敗の可能性。次回CIで--extraオプションにより再取得されます。')
          for rec in records:
              rec['is_portfolio'] = rec.get('ticker', '') in PORTFOLIO_TICKERS

          # AI定性評価をマージ
          ai_path = 'web/public/ai_summaries.json'
          if os.path.exists(ai_path):
              with open(ai_path) as f:
                  summaries = json.load(f)
              for rec in records:
                  summary = summaries.get(rec.get('ticker'))
                  if summary:
                      rec['ai_summary'] = summary
              print(f'ai_summaries: {sum(1 for r in records if r.get(\"ai_summary\"))} stocks')

          # 株価スパークライン（直近1年の週次終値）をCI側で一括取得
          import yfinance as yf
          from datetime import datetime, timedelta
          end_date = datetime.now()
          start_date = end_date - timedelta(days=365)
          tickers_list = [r['ticker'] for r in records if r.get('ticker')]
          try:
              price_data = yf.download(tickers_list, start=start_date.strftime('%Y-%m-%d'),
                                       end=end_date.strftime('%Y-%m-%d'), interval='1wk',
                                       group_by='ticker', progress=False)
              sparkline_count = 0
              for rec in records:
                  ticker = rec.get('ticker')
                  if not ticker:
                      continue
                  try:
                      if len(tickers_list) > 1:
                          closes = price_data[ticker]['Close'].dropna()
                      else:
                          closes = price_data['Close'].dropna()
                      if len(closes) > 2:
                          rec['sparkline'] = [round(float(v), 2) for v in closes.values]
                          rec['sparkline_dates'] = [d.strftime('%Y-%m-%d') for d in closes.index]
                          sparkline_count += 1
                  except Exception:
                      pass
              print(f'sparklines: {sparkline_count}/{len(tickers_list)} stocks')
          except Exception as e:
              print(f'sparkline error: {e}')

          with open('web/public/ranking.json', 'w') as f:
              json.dump({'date': date_str[:4]+'-'+date_str[4:6]+'-'+date_str[6:], 'count': len(records), 'portfolio_tickers': PORTFOLIO_TICKERS, 'stocks': records}, f)
          print(f'ranking.json: {len(records)} stocks')

          # 履歴用の軽量JSON（ticker + scores のみ）
          os.makedirs('web/public/history', exist_ok=True)
          date_fmt = date_str[:4]+'-'+date_str[4:6]+'-'+date_str[6:]
          history_cols = ['ticker', 'total_score', 'valuation_score', 'growth_score', 'quality_score', 'earnings_momentum_score']
          h_available = [c for c in history_cols if c in df.columns]
          h_records = clean(df[h_available].to_dict(orient='records'))
          with open(f'web/public/history/{date_fmt}.json', 'w') as f:
              json.dump(h_records, f)

          # 履歴インデックス更新
          index_path = 'web/public/history/index.json'
          dates = []
          if os.path.exists(index_path):
              with open(index_path) as f:
                  dates = json.load(f)
          if date_fmt not in dates:
              dates.append(date_fmt)
              dates.sort()
          with open(index_path, 'w') as f:
              json.dump(dates, f)
          print(f'history: {date_fmt} ({len(h_records)} stocks, {len(dates)} dates total)')
          "

      - name: React ダッシュボードをビルド
        run: |
          cd web
          npm ci
          npm run build

      - name: 結果をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: ranking-${{ github.run_id }}
          path: |
            output/ranking_*.csv
            output/report_*.txt
          retention-days: 90

      - name: 結果をリポジトリにコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ビルド生成物以外の変更を戻す
          git checkout -- . 2>/dev/null || true
          git add -f output/ranking_*.csv output/report_*.txt output/ic_history.json web/public/ranking.json web/public/history/
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
          else
            COMMIT_DATE=$(date +%Y-%m-%d)
            git commit -m "日次スコアリング結果を更新 ${COMMIT_DATE}"
            git pull --rebase origin main || true
            git push
          fi

      - name: GitHub Pagesにアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy-pages:
    needs: scoring
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
