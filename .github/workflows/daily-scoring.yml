name: 日次スコアリング

on:
  schedule:
    # 米国市場クローズ後 UTC 22:00 = EST 17:00 = JST 07:00（翌朝）
    # 平日のみ実行
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scoring:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: uv インストール
        uses: astral-sh/setup-uv@v4

      - name: 依存関係インストール
        run: uv sync

      - name: S&P500 スコアリング実行
        run: |
          uv run python -m stock_ranking.ranking --top 50
        env:
          PYTHONUNBUFFERED: '1'

      - name: 結果をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: ranking-${{ github.run_id }}
          path: |
            output/ranking_*.csv
            output/report_*.txt
            output/ranking_*.html
          retention-days: 90

      - name: 結果をリポジトリにコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/ranking_*.csv output/report_*.txt output/ranking_*.html
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
          else
            COMMIT_DATE=$(date +%Y-%m-%d)
            git commit -m "日次スコアリング結果を更新 ${COMMIT_DATE}"
            git pull --rebase origin main
            git push
          fi

      - name: GitHub Pages用ファイルを準備
        run: |
          mkdir -p _site
          # 最新のHTMLをindex.htmlとしてコピー
          LATEST_HTML=$(ls -t output/ranking_*.html 2>/dev/null | head -1)
          if [ -n "$LATEST_HTML" ]; then
            cp "$LATEST_HTML" _site/index.html
          fi

      - name: GitHub Pagesにデプロイ
        if: hashFiles('_site/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: scoring
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
